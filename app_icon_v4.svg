<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="scan" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Radar circles -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="#7C3AED" stroke-width="4" opacity="0.3"/>
  <circle cx="256" cy="256" r="110" fill="none" stroke="#7C3AED" stroke-width="3" opacity="0.4"/>
  <circle cx="256" cy="256" r="60" fill="none" stroke="#7C3AED" stroke-width="2" opacity="0.5"/>
  <!-- Crosshair lines -->
  <line x1="256" y1="96" x2="256" y2="416" stroke="#7C3AED" stroke-width="2" opacity="0.2"/>
  <line x1="96" y1="256" x2="416" y2="256" stroke="#7C3AED" stroke-width="2" opacity="0.2"/>
  <!-- Scan arc (sonar sweep) -->
  <path d="M256 256 L256 96 A160 160 0 0 1 416 256 Z" fill="url(#scan)" opacity="0.35"/>
  <!-- Box in center (target) -->
  <rect x="196" y="196" width="120" height="120" rx="16" fill="none" stroke="#FFFFFF" stroke-width="14"/>
  <rect x="180" y="178" width="152" height="36" rx="10" fill="none" stroke="#FFFFFF" stroke-width="14"/>
  <line x1="196" y1="260" x2="316" y2="260" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round"/>
  <!-- Target dot -->
  <circle cx="256" cy="256" r="12" fill="#F59E0B"/>
  <!-- Small crosshair marks -->
  <line x1="256" y1="84" x2="256" y2="108" stroke="#A78BFA" stroke-width="4" stroke-linecap="round"/>
  <line x1="256" y1="404" x2="256" y2="428" stroke="#A78BFA" stroke-width="4" stroke-linecap="round"/>
  <line x1="84" y1="256" x2="108" y2="256" stroke="#A78BFA" stroke-width="4" stroke-linecap="round"/>
  <line x1="404" y1="256" x2="428" y2="256" stroke="#A78BFA" stroke-width="4" stroke-linecap="round"/>
</svg>
