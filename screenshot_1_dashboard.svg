  <!-- Callout box 1: Auto-scan explanation -->
  <g filter="url(#callout)">
    <rect x="32" y="670" width="400" height="90" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
    <rect x="32" y="670" width="4" height="90" rx="2" fill="#3B82F6"/>
    <text x="52" y="696" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#0F172A">① Auto-scan detects dead stock</text>
    <text x="52" y="718" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748B">GenieStock automatically scans your</text>
