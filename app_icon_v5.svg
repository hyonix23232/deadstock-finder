<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="box" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#CBD5E1"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Box -->
  <rect x="156" y="216" width="200" height="160" rx="16" fill="none" stroke="url(#box)" stroke-width="18"/>
  <rect x="136" y="196" width="240" height="40" rx="10" fill="none" stroke="url(#box)" stroke-width="18"/>
  <line x1="156" y1="290" x2="316" y2="290" stroke="#FFFFFF" stroke-width="10" stroke-linecap="round" opacity="0.3"/>
  <line x1="156" y1="330" x2="280" y2="330" stroke="#FFFFFF" stroke-width="10" stroke-linecap="round" opacity="0.3"/>
  <!-- Upward arrow from box (stock moving / selling) -->
  <path d="M256 216 L256 140" stroke="url(#arrow)" stroke-width="18" stroke-linecap="round"/>
  <path d="M220 176 L256 140 L292 176" stroke="url(#arrow)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Small sparkle -->
  <circle cx="340" cy="140" r="8" fill="#FCD34D"/>
  <line x1="340" y1="124" x2="340" y2="116" stroke="#FCD34D" stroke-width="4" stroke-linecap="round"/>
  <line x1="340" y1="156" x2="340" y2="164" stroke="#FCD34D" stroke-width="4" stroke-linecap="round"/>
  <line x1="324" y1="140" x2="316" y2="140" stroke="#FCD34D" stroke-width="4" stroke-linecap="round"/>
  <line x1="356" y1="140" x2="364" y2="140" stroke="#FCD34D" stroke-width="4" stroke-linecap="round"/>
</svg>
