      <rect x="8" y="11" width="30" height="30" rx="6" fill="#F1F5F9"/>
      <text x="48" y="24" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#2563EB" font-weight="500">Denim Jacket</text>
