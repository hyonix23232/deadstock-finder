      <text x="562" y="31" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#2563EB" font-weight="500">Bundle</text>
      <rect x="660" y="14" width="60" height="24" rx="6" fill="#2563EB"/>
      <text x="672" y="31" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#FFFFFF" font-weight="500">Apply</text>
