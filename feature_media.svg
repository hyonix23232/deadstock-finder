      <text x="399" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#64748B">Untracked</text>
      <rect x="476" y="16" width="44" height="20" rx="10" fill="#FEF3C7"/>
      <text x="484" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#D97706" font-weight="600">58d</text>
