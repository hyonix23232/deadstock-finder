<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="heroBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F8FAFC"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F87171"/>
      <stop offset="100%" stop-color="#DC2626"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>
    <filter id="shadowSmall">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1600" height="900" fill="url(#heroBg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="100" x2="1600" y2="100" stroke="#FFFFFF" stroke-width="1"/>
    <line x1="0" y1="200" x2="1600" y2="200" stroke="#FFFFFF" stroke-width="1"/>
    <line x1="0" y1="300" x2="1600" y2="300" stroke="#FFFFFF" stroke-width="1"/>
    <line x1="0" y1="400" x2="1600" y2="400" stroke="#FFFFFF" stroke-width="1"/>
    <line x1="0" y1="500" x2="1600" y2="500" stroke="#FFFFFF" stroke-width="1"/>
    <line x1="0" y1="600" x2="1600" y2="600" stroke="#FFFFFF" stroke-width="1"/>
    <line x1="0" y1="700" x2="1600" y2="700" stroke="#FFFFFF" stroke-width="1"/>
    <line x1="0" y1="800" x2="1600" y2="800" stroke="#FFFFFF" stroke-width="1"/>
  </g>

  <!-- Accent gradient orb -->
  <circle cx="1400" cy="100" r="300" fill="#3B82F6" opacity="0.06"/>
  <circle cx="200" cy="800" r="250" fill="#7C3AED" opacity="0.05"/>

  <!-- ====== LEFT SIDE — VALUE PROPOSITION ====== -->
  <text x="80" y="140" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="800" fill="#FFFFFF" letter-spacing="-1">Stop guessing which</text>
  <text x="80" y="200" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="800" fill="#FFFFFF" letter-spacing="-1">products are dead stock.</text>

  <rect x="80" y="230" width="90" height="4" rx="2" fill="#3B82F6"/>

  <text x="80" y="270" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#94A3B8" font-weight="400">Smart scan identifies unsold inventory and tells you</text>
  <text x="80" y="300" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#94A3B8" font-weight="400">exactly what to do — archive, discount, or bundle.</text>

  <!-- Feature pills -->
  <g transform="translate(80, 350)">
    <rect x="0" y="0" width="180" height="36" rx="18" fill="#1E293B"/>
    <circle cx="24" cy="18" r="6" fill="#34D399"/>
    <text x="40" y="24" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#CBD5E1">One-click scan</text>

    <rect x="200" y="0" width="200" height="36" rx="18" fill="#1E293B"/>
    <circle cx="224" cy="18" r="6" fill="#3B82F6"/>
    <text x="240" y="24" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#CBD5E1">Smart suggestions</text>

