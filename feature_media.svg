    <rect x="24" y="140" width="4" height="72" rx="2" fill="url(#purpleGrad)"/>
    <text x="42" y="166" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#64748B">Flagged Products</text>
    <text x="42" y="194" font-family="system-ui, -apple-system, sans-serif" font-size="26" fill="#0F172A" font-weight="700">36</text>

    <!-- Card 2 -->
